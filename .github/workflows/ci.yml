name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest]
        ocaml-compiler: ['5.3', '5.2', '5.1']
        include:
          - os: macos-latest
            ocaml-compiler: '5.3'

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: ${{ matrix.ocaml-compiler }}
          dune-version: '3.21'

      - run: opam pin add alcobar https://github.com/samoht/alcobar.git --no-action
      - run: opam install . --deps-only --with-test
      - run: opam exec -- dune build @install
      - run: opam exec -- dune runtest

  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: ocaml/setup-ocaml@v3
        with:
          ocaml-compiler: '5.3'
          dune-version: '3.21'

      - run: opam install ocamlformat.0.28.1
      - run: opam exec -- dune fmt 2>/dev/null || true
      - run: git diff --exit-code
